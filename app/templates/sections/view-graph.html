<div id="view-graph" style="display: none; width: 100%; height: calc(100vh - 6rem); position: relative; font-family: var(--font-family-sans); overflow: hidden; background: var(--bg-color);">

    <!-- Style overrides for Graph View -->
    <style>
        .graph-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .graph-svg {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        .graph-svg:active {
            cursor: grabbing;
        }
        /* Top Overlay Panel */
        .graph-overlay-top {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            right: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .graph-title-block {
            pointer-events: auto;
        }
        .graph-title-block h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-color);
        }
        .graph-title-block p {
            margin: 0.25rem 0 0 0;
            font-size: 0.8rem;
            color: #64748b;
        }
        .graph-search-box {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            box-shadow: var(--card-shadow);
            pointer-events: auto;
            width: 280px;
            transition: all 0.2s ease;
        }
        .graph-search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .graph-search-input {
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .graph-search-icon {
            color: #64748b;
            margin-right: 0.5rem;
        }
        
        /* Floating Control Panel (Filters) */
        .graph-control-panel {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1rem;
            box-shadow: var(--card-shadow);
            z-index: 10;
            width: 240px;
            max-height: 320px;
            overflow-y: auto;
        }
        .graph-control-header {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.4rem;
        }
        .graph-filter-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-color);
            cursor: pointer;
            user-select: none;
        }
        .graph-filter-checkbox {
            margin-right: 0.5rem;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .graph-color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
            display: inline-block;
        }

        /* SVG Node Styling */
        .node-circle {
            stroke-width: 1.5px;
            stroke: var(--bg-color);
            transition: r 0.25s ease, stroke-width 0.25s ease, filter 0.25s ease;
        }
        .node-text {
            font-family: var(--font-family-sans);
            font-weight: 600;
            font-size: 10px;
            fill: var(--text-color);
            pointer-events: none;
            transition: font-size 0.25s ease, opacity 0.25s ease;
        }
        .link-line {
            stroke: var(--text-color);
            stroke-opacity: 0.12;
            stroke-width: 1px;
            fill: none;
            transition: stroke-opacity 0.25s ease, stroke-width 0.25s ease, stroke 0.25s ease;
        }

        /* Hover states */
        .node-circle.active-node {
            stroke: var(--text-color);
            stroke-width: 2.5px;
            filter: drop-shadow(0px 0px 8px currentColor);
        }
        .node-text.active-text {
            font-size: 12px;
            opacity: 1 !important;
        }
        .link-line.active-link {
            stroke: var(--accent) !important;
            stroke-opacity: 0.75 !important;
            stroke-width: 1.8px !important;
        }
        .link-line.inactive-link {
            stroke-opacity: 0.02 !important;
        }
        .node-circle.inactive-node {
            opacity: 0.15;
        }
        .node-text.inactive-text {
            opacity: 0.15;
        }

        /* Tooltip style */
        .graph-tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            color: #f1f5f9;
            border-radius: 6px;
            padding: 0.6rem 0.9rem;
            font-size: 0.8rem;
            max-width: 250px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s ease;
            line-height: 1.4;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .graph-tooltip strong {
            display: block;
            margin-bottom: 0.25rem;
            color: #38bdf8;
            font-size: 0.85rem;
        }
    </style>

        svg.attr("viewBox", `0 0 ${width} ${height}`);

            .scaleExtent([0.15, 4])
            .on("zoom", (event) => {
                container.attr("transform", event.transform);
            });
        svg.call(zoom);

        const simulation = d3.forceSimulation(GRAPH_DATA.nodes)
            .force("link", d3.forceLink(GRAPH_DATA.links).id(d => d.id).distance(90))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(40));

        const link = container.append("g")
            .selectAll("line")
            .data(GRAPH_DATA.links)
            .join("line")
            .attr("class", "link-line");

        // Render Node Text Labels
        const text = node.append("text")
            .attr("class", "node-text")
            .attr("dx", 12)
            .attr("dy", 4)
            .text(d => d.name);

        // Tooltip element
        const tooltip = document.getElementById("graph-tooltip");

        // Hover Behavior
        node.on("mouseover", function(event, d) {
            // Find connected nodes
            const connectedNodeIds = new Set();
            connectedNodeIds.add(d.id);
            
            GRAPH_DATA.links.forEach(l => {
                if (l.source.id === d.id) connectedNodeIds.add(l.target.id);
                if (l.target.id === d.id) connectedNodeIds.add(l.source.id);
            });

            // Highlight links
            link.attr("class", l => {
                if (l.source.id === d.id || l.target.id === d.id) {
                    return "link-line active-link";
                }
                return "link-line inactive-link";
            });

            // Highlight circles & texts
            circle.classed("active-node", n => connectedNodeIds.has(n.id))
                  .classed("inactive-node", n => !connectedNodeIds.has(n.id));
            
            text.classed("active-text", n => n.id === d.id)
                .classed("inactive-text", n => !connectedNodeIds.has(n.id));

            // Show Tooltip
            tooltip.style.opacity = 1;
            tooltip.innerHTML = `<strong>${d.name}</strong>${d.desc}`;
            
            // Position Tooltip
            const mouseX = event.clientX;
            const mouseY = event.clientY;
            tooltip.style.left = (mouseX + 15) + "px";
            tooltip.style.top = (mouseY + 15) + "px";
        })
        .on("mousemove", function(event) {
            tooltip.style.left = (event.clientX + 15) + "px";
            tooltip.style.top = (event.clientY + 15) + "px";
        })
        .on("mouseout", function() {
            // Revert all classes
            link.attr("class", "link-line");
            circle.classed("active-node", false).classed("inactive-node", false);
            text.classed("active-text", false).classed("inactive-text", false);
            tooltip.style.opacity = 0;
        });

        // Click to Navigate
        node.on("click", function(event, d) {
            if (typeof showSection === "function") {
                showSection(d.section);
            }
        });

        // Simulation Update
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag Physics Functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Toggle Category Visibility
        const activeCategories = new Set(Object.keys(CATEGORIES));

        window.toggleCategory = function(cat, isChecked) {
            if (isChecked) {
                activeCategories.add(cat);
            } else {
                activeCategories.delete(cat);
            }

            // Update DOM element displays
            node.style("display", d => activeCategories.has(d.cat) ? "inline" : "none");
            link.style("display", l => (activeCategories.has(l.source.cat) && activeCategories.has(l.target.cat)) ? "inline" : "none");
        };

        // Search Graph Nodes
        window.searchGraph = function(query) {
            if (!query) {
                // Revert highlight
                circle.classed("active-node", false).classed("inactive-node", false);
                text.classed("active-text", false).classed("inactive-text", false);
                return;
            }

            const cleanQuery = query.toLowerCase();
            let matchedNode = null;

            circle.classed("active-node", n => {
                const match = n.name.toLowerCase().includes(cleanQuery) || n.desc.toLowerCase().includes(cleanQuery);
                if (match && !matchedNode) matchedNode = n; // Focus first match
                return match;
            });
            text.classed("active-text", n => n.name.toLowerCase().includes(cleanQuery) || n.desc.toLowerCase().includes(cleanQuery));

            // Pan/Zoom to matched node smoothly
            if (matchedNode) {
                const scale = 1.3;
                svg.transition()
                    .duration(750)
                    .call(
                        zoom.transform,
                        d3.zoomIdentity
                            .translate(width / 2, height / 2)
                            .scale(scale)
                            .translate(-matchedNode.x, -matchedNode.y)
                    );
            }
        };

        // Handle Window Resizing
        window.addEventListener("resize", () => {
            const containerEl = document.getElementById("view-graph");
            if (containerEl && containerEl.style.display !== "none") {
                width = containerEl.clientWidth;
                height = containerEl.clientHeight;
                svg.attr("viewBox", `0 0 ${width} ${height}`);
                simulation.force("center", d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        });

        // Trigger simulation restart when tab becomes active
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === "style") {
                    const display = document.getElementById("view-graph").style.display;
                    if (display !== "none") {
                        // Re-fetch width/height to make sure it's correct
                        const containerEl = document.getElementById("view-graph");
                        width = containerEl.clientWidth;
                        height = containerEl.clientHeight;
                        svg.attr("viewBox", `0 0 ${width} ${height}`);
                        simulation.force("center", d3.forceCenter(width / 2, height / 2));
                        simulation.alpha(0.5).restart();
                    }
                }
            });
        });
        observer.observe(document.getElementById("view-graph"), { attributes: true });

    </script>
</div>
